<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparison - Data Types & Models</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b;
    --card: #18181b;
    --border: #27272a;
    --panel-color: #0ea5e9;
    --cat-color: #f43f5e;
    --long-color: #a855f7;
    --text: #f4f4f5;
  }
  
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    width: 95%;
    max-width: 1400px;
    height: 85vh;
    background: radial-gradient(circle at 50% 0%, rgba(39,39,42,0.5) 0%, transparent 70%), var(--bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.8);
  }

  .header {
    text-align: center;
    padding: 30px;
    position: relative;
    z-index: 10;
  }
  .header h1 {
    margin: 0 0 10px 0;
    font-size: 28px;
    background: linear-gradient(to right, #fff, #a1a1aa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p { color: #a1a1aa; max-width: 800px; margin: 0 auto; line-height: 1.5; }

  .workspace {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 400px;
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 1s;
    z-index: 1;
  }
  .workspace.active {
    background: rgba(255,255,255,0.02);
    border-style: solid;
    border-color: rgba(255,255,255,0.05);
    box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
    backdrop-filter: blur(5px);
  }

  .cluster {
    position: absolute;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
    transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 5;
    box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 10px 30px rgba(0,0,0,0.5);
  }

  /* Initial layout */
  .c-panel { width: 160px; height: 160px; top: 20%; left: 10%; background: linear-gradient(135deg, var(--panel-color), #0284c7); }
  .c-cat { width: 150px; height: 150px; top: 15%; right: 10%; background: linear-gradient(135deg, var(--cat-color), #be123c); }
  .c-long { width: 170px; height: 170px; bottom: 20%; left: 15%; background: linear-gradient(135deg, var(--long-color), #7e22ce); }

  /* Merged layout */
  .workspace.active .cluster { font-size: 14px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
  .workspace.active .c-panel { width: 120px; height: 120px; top: 40%; left: 25%; transform: translate(-50%, -50%); }
  .workspace.active .c-cat { width: 120px; height: 120px; top: 60%; left: 50%; transform: translate(-50%, -50%); }
  .workspace.active .c-long { width: 120px; height: 120px; top: 40%; left: 75%; transform: translate(-50%, -50%); }

  .data-point {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    transition: all 0.5s;
  }

  .controls-panel {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(150px);
    background: rgba(24, 24, 27, 0.8);
    border: 1px solid var(--border);
    backdrop-filter: blur(15px);
    padding: 20px 40px;
    border-radius: 20px;
    display: flex;
    gap: 40px;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
  }
  .workspace.active ~ .controls-panel { transform: translateX(-50%) translateY(0); }

  .slider-group { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .slider-group label { font-size: 13px; font-weight: 600; color: #a1a1aa; text-transform: uppercase; letter-spacing: 1px; }
  
  input[type=range] {
    -webkit-appearance: none;
    width: 200px;
    background: transparent;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    height: 18px; width: 18px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    margin-top: -7px;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
  }
  input[type=range]::-webkit-slider-runnable-track {
    width: 100%; height: 4px;
    background: var(--border);
    border-radius: 2px;
  }

  .penalization-wave {
    position: absolute;
    top: -50%; bottom: -50%;
    width: 150px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-300px) rotate(15deg);
    filter: blur(8px);
    z-index: 8;
    pointer-events: none;
  }
  @keyframes sweep {
    0% { transform: translateX(-300px) rotate(15deg); }
    100% { transform: translateX(1800px) rotate(15deg); }
  }

  .start-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    color: #000;
    border: none;
    padding: 16px 40px;
    font-size: 16px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 20;
    box-shadow: 0 10px 20px rgba(255,255,255,0.2);
  }
  .start-btn:hover { transform: translate(-50%, -55%); box-shadow: 0 15px 30px rgba(255,255,255,0.3); }
  .workspace.active .start-btn { opacity: 0; pointer-events: none; }

</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Data Types & Model Filters</h1>
    <p>"Three distinct raw data clusters move into a central workspace. User-controlled selection meters transform these clusters through specific model filters. Penalization waves highlight relevant variables while fading redundant noise."</p>
  </div>

  <div class="workspace" id="workspace">
    <button class="start-btn" onclick="initiateMerge()">Analyze Complex Data</button>
  </div>

  <div class="cluster c-panel" id="c-panel">Panel</div>
  <div class="cluster c-cat" id="c-cat">Categorical</div>
  <div class="cluster c-long" id="c-long">Longitudinal</div>

  <div class="penalization-wave" id="wave"></div>

  <div class="controls-panel">
    <div class="slider-group">
      <label>Model Filter Optimizer</label>
      <input type="range" min="0" max="100" value="0" id="filter-slider" oninput="applyFilter()">
    </div>
    <div class="slider-group">
      <label>Penalization Threshold</label>
      <input type="range" min="0" max="100" value="0" id="penalize-slider" onchange="triggerWave()">
    </div>
  </div>
</div>

<script>
  let nodesCreated = false;

  function createParticles(containerId) {
    const container = document.getElementById(containerId);
    for(let i=0; i<20; i++) {
      let pt = document.createElement('div');
      pt.className = 'data-point';
      let angle = Math.random() * Math.PI * 2;
      let r = 60 + Math.random() * 40;
      pt.style.transform = `translate(${Math.cos(angle)*r}px, ${Math.sin(angle)*r}px)`;
      container.appendChild(pt);
    }
  }

  function initiateMerge() {
    document.getElementById('workspace').classList.add('active');
    
    if(!nodesCreated) {
      setTimeout(() => {
        createParticles('c-panel');
        createParticles('c-cat');
        createParticles('c-long');
        document.querySelectorAll('.data-point').forEach(p => p.style.opacity = '0.5');
        nodesCreated = true;
      }, 1200);
    }
  }

  function applyFilter() {
    const val = document.getElementById('filter-slider').value;
    document.querySelectorAll('.data-point').forEach(p => {
      // Simulate restructuring and filtering based on slider
      if(Math.random() * 100 < val) {
        p.style.background = '#0ea5e9';
        p.style.boxShadow = '0 0 10px #0ea5e9';
        p.style.transform += ` scale(1.2)`;
      } else {
        p.style.background = '#fff';
        p.style.boxShadow = 'none';
      }
    });
  }

  function triggerWave() {
    const wave = document.getElementById('wave');
    wave.style.animation = 'none';
    void wave.offsetWidth;
    wave.style.animation = 'sweep 1.5s ease-in-out';

    const threshold = document.getElementById('penalize-slider').value;

    setTimeout(() => {
      document.querySelectorAll('.data-point').forEach(p => {
        if(Math.random() * 100 < threshold) {
          p.style.opacity = '0.1';
          p.style.transform += ' scale(0.6)';
        } else {
          p.style.opacity = '1';
          p.style.background = '#10b981';
          p.style.boxShadow = '0 0 15px #10b981';
          p.style.transform += ' scale(1.5)';
        }
      });
    }, 800);
  }
</script>
</body>
</html>
